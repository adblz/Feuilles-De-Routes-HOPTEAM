<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#161B26">
    <title>Administration — Feuilles de route</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/responsable.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>

<header>
    <div class="header-left">
        <img class="header-logo-reduit" src="/assets/images/logo-reduit.png" alt="Logo">
        <div>
            <h1>ADMINISTRATION</h1>
            <span class="admin-badge">Gestion des accès</span>
        </div>
    </div>
    <div class="admin-header-right">
        <span id="admin-user-nom" class="admin-user-nom"></span>
        <button class="resp-btn-logout" id="btn-admin-logout">Déconnexion</button>
    </div>
</header>

<div id="toast"></div>

<div class="container admin-main">

    <div class="card">
        <div class="admin-section-header">
            <h2>Utilisateurs</h2>
            <button class="btn-admin-nouveau" id="btn-nouvel-utilisateur">+ Nouvel utilisateur</button>
        </div>
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Rôle</th>
                        <th>Contrat</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-users-tbody">
                    <tr><td colspan="5" class="admin-table-vide">Chargement…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div class="admin-section-header">
            <h2>Suggestions <span id="sug-badge" class="sug-badge hidden"></span></h2>
        </div>
        <div id="admin-suggestions-list">
            <div class="sug-vide">Chargement…</div>
        </div>
    </div>

</div>

<!-- Modal : Créer un utilisateur -->
<div class="modal-overlay" id="modal-creer">
    <div class="modal admin-modal">
        <div class="modal-histo-header">
            <h3>Nouvel utilisateur</h3>
            <button class="btn-histo-close" id="btn-close-creer">&#10005;</button>
        </div>
        <div class="admin-modal-body">
            <div class="form-group">
                <label>Email <span class="req">*</span></label>
                <input type="email" id="form-creer-email" placeholder="prenom.nom@entreprise.fr">
            </div>
            <div class="form-group">
                <label>Nom complet <span class="req">*</span></label>
                <input type="text" id="form-creer-nom" placeholder="Prénom Nom">
            </div>
            <div class="form-group">
                <label>Type de contrat</label>
                <select id="form-creer-contrat">
                    <option value="39">39h</option>
                    <option value="35">35h</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nom de l'entreprise</label>
                <input type="text" id="form-creer-company" placeholder="Mon Entreprise SARL">
            </div>
            <div class="form-group">
                <label>Email du responsable</label>
                <input type="email" id="form-creer-email-resp" placeholder="responsable@hopteam.fr">
            </div>
            <div class="form-group">
                <label>Mot de passe provisoire <span class="req">*</span></label>
                <input type="text" id="form-creer-password" placeholder="À communiquer au technicien">
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="btn-admin-annuler" id="btn-annuler-creer">Annuler</button>
            <button class="btn-admin-valider" id="btn-submit-creer">Créer le compte</button>
        </div>
    </div>
</div>

<!-- Modal : Modifier un utilisateur -->
<div class="modal-overlay" id="modal-modifier">
    <div class="modal admin-modal">
        <div class="modal-histo-header">
            <h3>Modifier l'utilisateur</h3>
            <button class="btn-histo-close" id="btn-close-modifier">&#10005;</button>
        </div>
        <div class="admin-modal-body">
            <div class="form-group">
                <label>Email (non modifiable)</label>
                <p class="admin-email-display" id="modifier-email">—</p>
            </div>
            <input type="hidden" id="modifier-id">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="modifier-nom">
            </div>
            <div class="form-group">
                <label>Type de contrat</label>
                <select id="modifier-contrat">
                    <option value="39">39h</option>
                    <option value="35">35h</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="modifier-role">
                    <option value="technicien">Technicien</option>
                    <option value="responsable">Responsable</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nom de l'entreprise</label>
                <input type="text" id="modifier-company" placeholder="Mon Entreprise SARL">
            </div>
            <div class="form-group">
                <label>Email du responsable</label>
                <input type="email" id="modifier-email-resp" placeholder="responsable@hopteam.fr">
            </div>
        </div>
        <div class="admin-modal-footer">
            <button class="btn-admin-annuler" id="btn-annuler-modifier">Annuler</button>
            <button class="btn-admin-valider" id="btn-submit-modifier">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module" src="../js/admin.js"></script>
</body>
</html>
